<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FABulous – Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../login/login.css"/>
  <style>
    .left-panel { background: #1a2820; }
    .admin-badge {
      display: inline-block;
      background: rgba(52,152,219,0.18);
      color: #5dade2;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 12px;
      border-radius: 999px;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <img src="../images/Top_Left_Nav_Logo.png" alt="FABulous Logo" class="nav-logo"/>
  </nav>

  <div class="page-controls">
    <a href="../login/login.html" class="ctrl-btn return-btn">&#8592; User Login</a>
  </div>

  <main class="card-container">
    <div class="left-panel">
      <img src="../images/Big Logo.png" alt="FABulous Logo" class="brand-logo-img" />
      <h1 class="brand-heading">Admin Access<br/>FABulous</h1>
      <p class="brand-desc">Restricted to authorized Fab Lab administrators only.</p>
      <div class="carousel-dots">
        <span class="dot active"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>

    <div class="right-panel">
      <span class="admin-badge">ADMIN PORTAL</span>
      <h2 class="panel-title">Admin Login</h2>

      <div id="msg-area"></div>

      <form method="POST" action="admin_login_process.php" class="auth-form">
        <div class="input-group">
          <input type="text" name="username" class="input-field"
                 placeholder="Admin Username or Email" autocomplete="username" required/>
        </div>
        <div class="input-group">
          <input type="password" name="password" id="password" class="input-field"
                 placeholder="Password" autocomplete="current-password" required/>
        </div>
        <div class="show-password-row">
          <label class="checkbox-label">
            <input type="checkbox" id="showPass" onchange="togglePassword()"/>
            <span class="custom-checkbox"></span>
            Show Password
          </label>
        </div>
        <button type="submit" class="btn-primary">Sign In as Admin</button>
      </form>
    </div>
  </main>

  <script>
    function togglePassword() {
      document.getElementById('password').type =
        document.getElementById('showPass').checked ? 'text' : 'password';
    }

    (function () {
      const p = new URLSearchParams(window.location.search);
      const err = p.get('err');
      const area = document.getElementById('msg-area');
      if (err) {
        const el = document.createElement('p');
        el.className = 'error-msg';
        el.textContent = decodeURIComponent(err);
        area.appendChild(el);
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
