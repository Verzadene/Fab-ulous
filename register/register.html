<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FABulous – Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../register/register.css" />
  <script src="register.js" defer></script>
</head>
<body>

  <!-- Top Navigation -->
  <nav class="topnav">
    <img src="../images/Top_Left_Nav_Logo.png" alt="FABulous Logo" class="nav-logo" />
  </nav>

  <!-- Page Controls -->
  <div class="page-controls">
    <a href="../landing/landing.html" class="ctrl-btn return-btn">&#8592; Return to Landing Page</a>
  </div>

  <!-- Main Card -->
  <main class="card-container">

    <!-- Left Panel -->
    <div class="left-panel">
      <img src="../images/Big Logo.png" alt="FABulous Logo" class="brand-logo-img" />
      <h1 class="brand-heading">Explore Fablab<br/>with Fab-ulous</h1>
      <p class="brand-desc">
        As technology evolves, sharing projects in both software and hardware is important.
        FABulous provides a community to share your projects in a single platform
      </p>
      <div class="carousel-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <h2 class="panel-title">Register</h2>

      <!-- Error message shown when redirected back from register.php -->
      <div id="errorMsg" class="error-server"></div>
      <div id="prefillNotice" class="error-server prefill-notice" style="display:none;"></div>

      <form id="regForm" action="../register/register.php" method="POST">

        <!-- First / Last Name row -->
        <div class="name-row">
          <div class="input-group half">
            <input type="text" id="firstName" name="firstName" class="input-field"
                   placeholder="First Name" autocomplete="given-name" required/>
          </div>
          <div class="input-group half">
            <input type="text" id="lastName" name="lastName" class="input-field"
                   placeholder="Last Name" autocomplete="family-name" required/>
          </div>
        </div>

        <div class="input-group">
          <input type="text" id="username" name="username" class="input-field"
                 placeholder="Username" autocomplete="username" required/>
        </div>

        <div class="input-group">
          <input type="email" id="email" name="email" class="input-field"
                 placeholder="Email" autocomplete="email" required/>
        </div>

        <div class="input-group">
          <input type="password" id="password" name="password" class="input-field"
                 placeholder="Password" autocomplete="new-password" required/>
        </div>

        <div class="input-group">
          <input type="password" id="confirmPassword" name="confirmPassword" class="input-field"
                 placeholder="Confirm Password" autocomplete="new-password" required/>
        </div>

        <button type="submit" class="btn-primary">Sign up</button>

      </form>

      <!-- OR DIVIDER -->
      <p class="or-divider">Or</p>

      <!-- CONTINUE WITH GOOGLE — routes to login.php?google=1 which triggers OAuth -->
      <a href="../login/login.php?google=1" class="btn-google">
        <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.2 0 5.9 1.1 8.1 2.9l6-6C34.5 3.1 29.6 1 24 1 14.8 1 7 6.7 3.7 14.6l7 5.4C12.4 13.8 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.4 5.7c4.3-4 6.8-9.9 6.8-16.9z"/>
          <path fill="#FBBC05" d="M10.7 28.6A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.1.7-4.6l-7-5.4A23.8 23.8 0 0 0 .5 24c0 3.8.9 7.4 2.7 10.6l7.5-6z"/>
          <path fill="#34A853" d="M24 46.5c5.6 0 10.4-1.9 13.8-5.1l-7.4-5.7c-1.9 1.3-4.4 2-6.4 2-6.3 0-11.6-4.3-13.5-10l-7.5 6C7 41.8 14.8 46.5 24 46.5z"/>
        </svg>
        Continue with Google
      </a>

      <div class="bottom-links">
        <span class="bottom-text">Already have Account?
          <a href="../login/login.php" class="link-btn">Log in Now!</a>
        </span>
      </div>
    </div>

  </main>

  <!-- Show error from register.php redirect -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const error  = params.get('error');
    const errDiv = document.getElementById('errorMsg');
    if (error === 'email_taken') {
      errDiv.textContent = 'This email is already registered. Please log in instead.';
      errDiv.style.display = 'block';
    } else if (error === 'username_taken') {
      errDiv.textContent = 'This username is already taken. Please choose another.';
      errDiv.style.display = 'block';
    } else if (error === 'weak_password') {
      errDiv.textContent = 'Password must be at least 16 characters and contain 2+ numbers and 2+ special characters.';
      errDiv.style.display = 'block';
    } else if (error === 'password_mismatch') {
      errDiv.textContent = 'Passwords do not match. Please try again.';
      errDiv.style.display = 'block';
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
