<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Bootstrap 5 -->

<body>

  <!-- ── NAV ── -->
  <nav class="fab-nav">

      <a href="#" class="nav-link-text">Settings</a>

  </nav>

      <p class="hero-eyebrow">Fab-ulous,</p>

      <div class="search-wrap">

      <p class="hero-desc">
